services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_dev_password
    ports:
      - "${AGENTHUB_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agenthub_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_dev_password
    ports:
      - "5050:80"
    volumes:
      - agenthub_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  agenthub_postgres:
  agenthub_pgadmin:
